name: 多平台构建
on:
  push:
    branches: [ main, master, v1.5.1-branch ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master, v1.5.1-branch ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-20.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装依赖 (Ubuntu)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: 安装 WebView2 (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install webview2-runtime -y

      - name: 安装 npm 依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: '音频定时播放器 v__VERSION__'
          releaseBody: |
            ## 📦 音频定时播放器 v__VERSION__

            多平台自动构建完成！

            | 平台 | 文件 |
            |------|------|
            | 🪟 Windows | .exe 安装包 |
            | 🍎 macOS | .dmg 磁盘镜像 |
            | 🐧 Linux | .deb 安装包 |
          releaseDraft: true
          prerelease: false
