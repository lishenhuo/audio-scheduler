name: 构建发布

on:
  push:
    tags:
      - "v*"
    branches:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装前端依赖
        run: npm ci

      - name: 安装 Tauri CLI
        run: npm install -D @tauri-apps/cli

      - name: 构建前端
        run: npm run build

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseDraft: false
          prerelease: false
          tagName: v1.5.1
          releaseName: 音频定时播放器 v1.5.1
          releaseBody: |
            # 音频定时播放器 v1.5.1
            
            ✅ Windows exe 安装包
            - 自定义音频选择
            - 定时播放设置
            - 系统托盘后台运行

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-installer
          path: target/release/bundle/*.exe
          retention-days: 30
